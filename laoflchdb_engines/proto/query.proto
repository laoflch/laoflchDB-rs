syntax = "proto3";

package laoflchdb;

import "field.proto";
import "row.proto";

// 过滤操作符
enum FilterOperator {
    FILTER_OPERATOR_UNSPECIFIED = 0;
    FILTER_OPERATOR_EQ = 1;          // 等于
    FILTER_OPERATOR_NEQ = 2;         // 不等于
    FILTER_OPERATOR_GT = 3;          // 大于
    FILTER_OPERATOR_GTE = 4;         // 大于等于
    FILTER_OPERATOR_LT = 5;          // 小于
    FILTER_OPERATOR_LTE = 6;         // 小于等于
    FILTER_OPERATOR_IN = 7;          // 在列表中
    FILTER_OPERATOR_NOT_IN = 8;      // 不在列表中
    FILTER_OPERATOR_LIKE = 9;        // 字符串匹配
    FILTER_OPERATOR_IS_NULL = 10;    // 为空
    FILTER_OPERATOR_IS_NOT_NULL = 11;// 不为空
}

// 列过滤器 - 单个列的多个条件，逻辑关系：OR (同一个列的多个条件是 OR 关系
message ColumnFilter {
    string column_name = 1;          // 列名
    repeated ColumnFilterCondition conditions = 2;  // 多个条件，OR 关系
}

// 单个列过滤条件
message ColumnFilterCondition {
    FilterOperator op = 1;           // 操作符
    Field value = 2; // 比较值（除了 IN/NOT_IN 操作符外使用）
    repeated Field values = 3; // 多个值（用于 IN/NOT_IN）
}

// 表过滤器 - 单个表的多个列过滤器，逻辑关系：AND (CNF 中的一个 clause
message TableFilter {
    string table_name = 1;           // 表名
    repeated ColumnFilter column_filters = 2;  // 多个列过滤器，AND 关系
}

// 查询请求 - 完整的 CNF 表达式：(表1 AND 列1) AND (表2 AND 列2) ...
message Query {
    repeated TableFilter table_filters = 1;  // 多个表过滤器，AND 关系 (CNF)
    optional uint32 limit = 2;               // 返回结果数量限制
    optional uint32 offset = 3;              // 跳过的结果数量
    repeated string projected_columns = 4;    // 需要返回的列名列表，为空则返回所有列
}

// 查询结果
message QueryResult {
    repeated QueryRow rows = 1;  // 查询到的行
}

// 查询返回的行（包含表名和行数据）
message QueryRow {
    string table_name = 1;
    uint64 row_id = 2;
    Row row = 3;
}
