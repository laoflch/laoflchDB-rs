syntax = "proto3";

package laoflchdb.metadata;

message TableMeta {
    string table_id = 1;
    string table_name = 2;
    uint32 column_count = 3;
}

message ColumnMeta {
    string table_id = 1;
    string column_id = 2;
    string column_name = 3;
    ColumnType column_type = 4;
}

enum ColumnType {
    COLUMN_TYPE_UNKNOWN = 0;
    COLUMN_TYPE_INT64 = 1;
    COLUMN_TYPE_STRING = 2;
    COLUMN_TYPE_BYTES = 3;
}
