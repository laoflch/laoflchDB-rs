# laoflchDB config

db_path: /workspace/rust_space/laoflchDB-rust/target/release/laoflch_db_data
log_level: info
default_policy: allow

access_protocols:
  - protocol: grpc
    enabled: true
    addr: 0.0.0.0:19777
    service_id: grpc_admin

  - protocol: rest
    enabled: true
    addr: 0.0.0.0:8080
    service_id: rest_admin

permissions:
  - service_id: grpc_admin
    default_policy: allow
    allowed_actions:
      - get
      - put
      - delete
      - create_table
      - drop_table
      - list_tables
      - list_table_cols
      - add_row
      - get_row
      - update_row
      - delete_row
      - get_all_meta
      - get_schema_info
      - get_table_meta
      - query

  - service_id: rest_admin
    default_policy: allow
    allowed_actions:
      - get
      - put
      - delete
      - create_table
      - drop_table
      - list_tables
      - list_table_cols
      - add_row
      - get_row
      - update_row
      - delete_row
      - get_all_meta
      - get_schema_info
      - get_table_meta
      - query
