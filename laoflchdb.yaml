# laoflchDB Production Configuration

# Database configuration
db_path: /workspace/rust_space/laoflchDB-rust/laoflch_db_data
index_path: /workspace/rust_space/laoflchDB-rust/laoflch_db_index
model_path: /workspace/rust_space/laoflchDB-rust/laoflch_db_model

# Vector service configuration
vector_service:
  enabled: true
  auto_load: true
  # 可指定启动时加载的模型名称列表（空列表表示加载 candle 目录下所有有效模型）
  load_models: ["bge-small-zh-v1.5"]

# HNSW 索引服务配置
hnsw_index:
  enabled: true
  dim: 512
  m: 32
  ef_construction: 200
  ef_search: 50
  max_elements: 1000000
  kv_db_path: /workspace/rust_space/laoflchDB-rust/laoflch_hnsw_data
  snapshot_path: /workspace/rust_space/laoflchDB-rust/laoflch_hnsw_snapshots

# Log configuration
log_level: info

# Default permission policy: allow or deny
default_policy: allow

# Runtime mode: multi_thread or single_thread
# Use single_thread for environments with thread creation restrictions
runtime_mode: multi_thread

# Access protocols configuration
access_protocols:
  # gRPC Admin Service
  - protocol: grpc
    enabled: true
    addr: 0.0.0.0:19777
    service_id: grpc_admin

  # REST Admin Service
  - protocol: rest
    enabled: true
    addr: 0.0.0.0:8080
    service_id: rest_admin

# Permissions configuration
permissions:
  - service_id: grpc_admin
    default_policy: allow
    allowed_actions:
      - get
      - put
      - delete
      - create_table
      - drop_table
      - list_tables
      - list_table_cols
      - add_row
      - get_row
      - update_row
      - delete_row
      - get_all_meta
      - get_schema_info
      - get_table_meta
      - query

  - service_id: rest_admin
    default_policy: allow
    allowed_actions:
      - get
      - put
      - delete
      - create_table
      - drop_table
      - list_tables
      - list_table_cols
      - add_row
      - get_row
      - update_row
      - delete_row
      - get_all_meta
      - get_schema_info
      - get_table_meta
      - query
