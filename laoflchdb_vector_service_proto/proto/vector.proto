syntax = "proto3";

package laoflchdb.vector;

option go_package = "laoflchdb/vector";
option java_package = "com.laoflchdb.vector";

message EmbeddingRequest {
  string model_name = 1;
  repeated string texts = 2;
  int32 dim = 3;
  repeated bytes images = 4;  // 图片原始字节数据（PNG/JPEG）
}

// 流式向量化请求切片
message EmbeddingChunk {
  // 第一个 chunk 中设置的元数据，后续 chunk 忽略
  string model_name = 1;
  int32 dim = 2;
  // 切片数据（单张图片的部分数据）
  bytes data = 3;
  // 切片索引（从 0 开始）
  int32 chunk_index = 4;
  // 总切片数
  int32 total_chunks = 5;
}

message EmbeddingResponse {
  bool success = 1;
  string message = 2;
  repeated EmbeddingResult results = 3;
}

message EmbeddingResult {
  string text = 1;
  repeated float embedding = 2;
  int32 dim = 3;
}

message SimilarityRequest {
  string model_name = 1;
  repeated float query_embedding = 2;
  repeated EmbeddingResult candidates = 3;
  int32 top_k = 4;
}

message SimilarityResponse {
  bool success = 1;
  string message = 2;
  repeated SimilarityResult results = 3;
}

message SimilarityResult {
  string text = 1;
  repeated float embedding = 2;
  float score = 3;
  int32 rank = 4;
}

message ModelInfoRequest {
  string model_name = 1;
}

message ModelInfoResponse {
  bool success = 1;
  string message = 2;
  string model_name = 3;
  int32 embedding_dim = 4;
  string model_path = 5;
  string device = 6;
  bool loaded = 7;
}

message ListModelsRequest {}

message ListModelsResponse {
  bool success = 1;
  string message = 2;
  repeated ModelInfoResponse models = 3;
}

message LoadModelRequest {
  string model_name = 1;
  string model_path = 2;
  int32 embedding_dim = 3;
}

message LoadModelResponse {
  bool success = 1;
  string message = 2;
  string model_name = 3;
}

message UnloadModelRequest {
  string model_name = 1;
}

message UnloadModelResponse {
  bool success = 1;
  string message = 2;
  string model_name = 3;
}

message ListLoadableModelsRequest {}

message LoadableModelInfo {
  string model_name = 1;
  string model_path = 2;
  int32 embedding_dim = 3;
  bool has_config = 4;
  bool has_tokenizer = 5;
  bool has_weights = 6;
  bool is_loaded = 7;
}

message ListLoadableModelsResponse {
  bool success = 1;
  string message = 2;
  string model_dir = 3;
  repeated LoadableModelInfo models = 4;
}

service VectorService {
  rpc CreateEmbedding(EmbeddingRequest) returns (EmbeddingResponse);
  rpc CreateEmbeddingStream(stream EmbeddingChunk) returns (EmbeddingResponse);
  rpc ComputeSimilarity(SimilarityRequest) returns (SimilarityResponse);
  rpc GetModelInfo(ModelInfoRequest) returns (ModelInfoResponse);
  rpc ListModels(ListModelsRequest) returns (ListModelsResponse);
  rpc LoadModel(LoadModelRequest) returns (LoadModelResponse);
  rpc UnloadModel(UnloadModelRequest) returns (UnloadModelResponse);
  rpc ListLoadableModels(ListLoadableModelsRequest) returns (ListLoadableModelsResponse);
}
