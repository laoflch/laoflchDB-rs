[package]
name = "laoflchDB-rust"
version = "0.1.0"
edition = "2021"

[workspace]
members = [
    ".",
    "xtask",
]

[dependencies]
laoflchdb_db_engine = { path = "./laoflchdb_db_engine" }
multi_table_rocksdb = { path = "./multi_table_rocksdb" }
rocksdb = { version = "0.50", package = "rust-rocksdb" }
prost = "0.12"
log = "0.4"
env_logger = "0.11"
tokio = { version = "1.0", features = ["full"] }
tonic = "0.11"
clap = { version = "4.5", features = ["derive"] }
bytes = "1.6"
serde = { version = "1.0", features = ["derive"] }
serde_yaml = "0.9"
serde_json = "1.0"
async-trait = "0.1"
axum = "0.7"
uuid = { version = "1.0", features = ["v4"] }

[build-dependencies]
prost-build = "0.12"
tonic-build = "0.11"

[dev-dependencies]
reqwest = { version = "0.11", features = ["json"] }
tempfile = "3.0"
