[package]
name = "laoflchDB-rust"
version = "0.1.0"
edition = "2021"
build = "build.rs"

[dependencies]
rocksdb = { version = "0.50", package = "rust-rocksdb" }
prost = "0.12"
uuid = { version = "1.10", features = ["v5", "serde"] }
log = "0.4"
env_logger = "0.11"
tokio = { version = "1.0", features = ["full"] }
tonic = "0.11"
clap = { version = "4.5", features = ["derive"] }
bytes = "1.6"
once_cell = "1.19"

[build-dependencies]
prost-build = "0.12"
tonic-build = "0.11"
