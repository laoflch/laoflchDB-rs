syntax = "proto3";

package laoflchdb.rpc;

service LaoflchDb {
  // KV 操作
  rpc Get(GetRequest) returns (GetResponse);
  rpc Put(PutRequest) returns (PutResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);

  // 表管理
  rpc CreateTable(CreateTableRequest) returns (CreateTableResponse);
  rpc ListTables(ListTablesRequest) returns (ListTablesResponse);
  rpc GetTableMeta(GetTableMetaRequest) returns (GetTableMetaResponse);
}

message GetRequest {
  string schema = 1;
  string table = 2;
  bytes key = 3;
}

message GetResponse {
  bool found = 1;
  bytes value = 2;
}

message PutRequest {
  string schema = 1;
  string table = 2;
  bytes key = 3;
  bytes value = 4;
}

message PutResponse {
  bool success = 1;
  string message = 2;
}

message DeleteRequest {
  string schema = 1;
  string table = 2;
  bytes key = 3;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}

message ColumnDef {
  string name = 1;
  int32 column_type = 2;
}

message CreateTableRequest {
  string schema = 1;
  string table_name = 2;
  repeated ColumnDef columns = 3;
}

message CreateTableResponse {
  bool success = 1;
  string table_id = 2;
  string message = 3;
}

message ListTablesRequest {
  string schema = 1;
}

message ListTablesResponse {
  bool success = 1;
  repeated string tables = 2;
  string message = 3;
}

message GetTableMetaRequest {
  string schema = 1;
  string table_name = 2;
}

message GetTableMetaResponse {
  bool exists = 1;
  string table_id = 2;
  string table_name = 3;
  int32 column_count = 4;
}
